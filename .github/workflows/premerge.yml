name: Premerge

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

env:
  CMAKE_PRESET: release
  LLVM_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Python 3.13.11
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.11'


    - name: Install LLVM
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 20
        sudo apt install libmlir-20-dev mlir-20-tools

    - name: Fix llvm-link
      run: |
        set -eux

        # llvm-link-20
        LLVM_LINK=$(command -v llvm-link-20 || true)


        if [ -z "$LLVM_LINK" ]; then
          LLVM_LINK=$(command -v llvm-link || true)
        fi

  
        if [ -z "$LLVM_LINK" ]; then
          LLVM_LINK=$(find /usr -name llvm-link 2>/dev/null | head -n 1)
        fi

        echo "Found llvm-link at: $LLVM_LINK"

        if [ -z "$LLVM_LINK" ]; then
          echo "llvm-link not found!"
          exit 1
        fi

        sudo ln -sf "$LLVM_LINK" /usr/local/bin/llvm-link

        llvm-link --version

    - name: Install Bitcode Tools
      run: |
        pip install wllvm==1.3.1

    - name: Run Pre-commit
      uses: pre-commit/action@v3.0.1

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        create-symlink: true
        max-size: "500M"
        key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Configure CMake
      run: |
        export CXXFLAGS="-Wno-deprecated-declarations"
        cmake --preset ${{env.CMAKE_PRESET}}

    - name: Build
      run: cmake --build --preset ${{env.CMAKE_PRESET}}

    - name: Test
      run: |
        ctest --preset ${{env.CMAKE_PRESET}} -E integration-tests
        ctest --preset ${{env.CMAKE_PRESET}} -R integration-tests -V